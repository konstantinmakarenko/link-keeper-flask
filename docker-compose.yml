version: '3.8'

services:
  # ====== 1. Flask-приложение (3 реплики) ======
  flask-app:
    build: .
    image: link-keeper-flask:latest
    container_name: flask-app
    env_file:
      - .env
    environment:
      # Переопределяем переменные для Docker-среды
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      mode: replicated
      replicas: 3
      # Дополнительные настройки деплоя
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.2'
          memory: 128M

  # ====== 2. Nginx (веб-сервер, балансировщик) ======
  nginx:
    image: nginx:alpine
    container_name: nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/app/app/static:ro  # Монтируем статику для Nginx
    ports:
      - "8080:80"   # На хосте будет доступен на порту 8080
    depends_on:
      - flask-app
    networks:
      - app-network
    restart: unless-stopped

  # ====== 3. PostgreSQL (база данных) ======
  db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    ports:
      - "5432:5432"   # Для отладки (можно убрать в продакшене)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ====== 4. Redis (кэш и сессии) ======
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - app-network
    restart: unless-stopped
    ports:
      - "6379:6379"   # Для отладки (можно убрать)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ====== Сети ======
networks:
  app-network:
    driver: bridge
    name: link-keeper-network

# ====== Тома (для сохранения данных) ======
volumes:
  postgres_data:
    name: link-keeper-postgres-data
  redis_data:
    name: link-keeper-redis-data