# Определяем группу серверов (Flask-реплики)
upstream flask_app {
    # flask-app — имя сервиса в docker-compose
    # 5000 — порт внутри контейнера Flask
    server flask-app:5000;
    # Если добавите больше реплик, можно раскидать нагрузку:
    # server flask-app:5000 weight=1;
    # server flask-app:5000 weight=2;
    # Но в docker-compose мы используем replicas, поэтому хватит одной записи
}

server {
    # Слушаем порт 80 (внутри контейнера, на хосте пробросим на 8080)
    listen 80;
    server_name localhost;

    # Максимальный размер загружаемого файла (для будущих функций)
    client_max_body_size 10M;

    # Путь к статическим файлам (CSS, JS, изображения)
    # Flask отдаёт статику по умолчанию, но Nginx делает это быстрее
    location /static/ {
        # Путь внутри контейнера nginx (будет смонтирован из контейнера flask-app)
        alias /app/app/static/;
        expires 30d;  # Кэшировать статику на 30 дней
        add_header Cache-Control "public, immutable";
    }

    # Все остальные запросы проксируем на Flask
    location / {
        proxy_pass http://flask_app;

        # Передаём реальный IP клиента
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты (чтобы не обрывать долгие запросы)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Страница ошибки 404 (если нужно)
    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
    }
}